<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive CaravaggioUI demo — explore components in the browser with the Flutter example app.">
  <meta name="theme-color" content="#662D8C">
  <link rel="canonical" href="https://caravaggioui.com/demo/">
  <title>Live Demo — CaravaggioUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lorenzo9598/caravaggio_ui/refs/heads/main/assets-for-api-docs/logo.png">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="demo-page">
  <header class="demo-header">
    <div class="demo-header-inner">
      <a class="demo-back" href="/">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to site
      </a>
      <div class="demo-title">
        <img src="https://raw.githubusercontent.com/lorenzo9598/caravaggio_ui/refs/heads/main/assets-for-api-docs/logo.png" alt="" width="28" height="28">
        <span>Live Demo</span>
      </div>
      <p class="demo-subtitle">Flutter example app · DevicePreview mode</p>
    </div>
  </header>

  <div class="demo-stage">
    <div class="demo-loader" id="demo-loader" aria-live="polite">
      <div class="demo-loader-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <p>Loading interactive demo…</p>
    </div>
    <iframe
      id="demo-frame"
      class="demo-frame"
      src="./app/"
      title="CaravaggioUI interactive example app"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </div>

  <script>
    (function () {
      var frame = document.getElementById('demo-frame');
      var loader = document.getElementById('demo-loader');
      if (!frame || !loader) return;

      frame.addEventListener('load', function () {
        loader.classList.add('hidden');
        frame.classList.add('ready');
      });
    })();
  </script>
</body>
</html>
